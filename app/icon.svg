<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- App icon background -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- Phone body -->
  <rect x="10" y="5" width="12" height="22" rx="2.5" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Screen -->
  <rect x="11.5" y="8" width="9" height="13" rx="1" fill="white" fill-opacity="0.25"/>
  <!-- Image frame in screen -->
  <rect x="12.5" y="9" width="7" height="5" rx="0.75" fill="white" fill-opacity="0.9"/>
  <!-- Mountain / landscape in image frame -->
  <path d="M13 13.5 L15 11 L17 13 L18 12 L19.5 13.5 Z" fill="#3b82f6"/>
  <!-- Sun dot in image frame -->
  <circle cx="13.8" cy="10.2" r="0.7" fill="#fbbf24"/>
  <!-- Text lines below image (caption) -->
  <rect x="12.5" y="15.2" width="7" height="1" rx="0.5" fill="white" fill-opacity="0.7"/>
  <rect x="12.5" y="17" width="5" height="1" rx="0.5" fill="white" fill-opacity="0.4"/>
  <!-- Home button -->
  <circle cx="16" cy="24.5" r="1.2" fill="none" stroke="white" stroke-width="1.2"/>
</svg>
